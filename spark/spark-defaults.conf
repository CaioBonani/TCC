# =============================================================
# Spark Defaults Configuration
# Lambda Architecture - TCC DATASUS
# =============================================================

# ─── Master ───
spark.master                          spark://spark-master:7077

# ─── Pacotes (Kafka + Cassandra Connectors) ───
spark.jars.packages                   org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0,com.datastax.spark:spark-cassandra-connector_2.12:3.4.1

# ─── Cassandra Connection ───
spark.cassandra.connection.host       cassandra
spark.cassandra.connection.port       9042

# ─── HDFS ───
spark.hadoop.fs.defaultFS             hdfs://namenode:9000

# ─── Event Log (para histórico no Spark UI) ───
spark.eventLog.enabled                true
spark.eventLog.dir                    /opt/spark/logs

# ─── Serialização (performance) ───
spark.serializer                      org.apache.spark.serializer.KryoSerializer

# ─── Memória e Paralelismo ───
spark.driver.memory                   1g
spark.executor.memory                 1g
spark.sql.shuffle.partitions          4

# ─── Structured Streaming (Speed Layer) ───
spark.sql.streaming.checkpointLocation /tmp/spark-checkpoints

# ─── UI ───
spark.ui.port                         4040
spark.ui.enabled                      true

# ─── Métricas (Prometheus) ───
spark.metrics.conf.*.sink.prometheusServlet.class  org.apache.spark.metrics.sink.PrometheusServlet
spark.metrics.conf.*.sink.prometheusServlet.path   /metrics/prometheus
spark.metrics.conf.master.sink.prometheusServlet.path  /metrics/master/prometheus
spark.metrics.conf.applications.sink.prometheusServlet.path  /metrics/applications/prometheus
