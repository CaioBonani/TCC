# =============================================================
# Grafana Dashboard Provisioning
# Carrega dashboards automaticamente ao iniciar
# =============================================================

apiVersion: 1

providers:
  - name: "Lambda Architecture Dashboards"
    orgId: 1
    folder: "Lambda Architecture"
    folderUid: "lambda-arch"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
